<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification - Beyond Data Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1e36 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-dark);
        }
        .verify-container {
            max-width: 550px;
            width: 100%;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            border-top: 5px solid var(--primary);
        }
        .verify-header {
            background: var(--primary);
            color: var(--white);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .verify-header i {
            font-size: 3rem;
            color: var(--golden);
            margin-bottom: 1rem;
        }
        .verify-body {
            padding: 2.5rem 2rem;
        }
        .result-box {
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: center;
        }
        .result-box.valid {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.05);
        }
        .result-box.invalid {
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.05);
        }
        .badge-status {
            font-size: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .badge-status.valid {
            background: var(--green);
            color: var(--white);
        }
        .badge-status.invalid {
            background: var(--red);
            color: var(--white);
        }
        .verify-details-table {
            width: 100%;
            margin-top: 1rem;
            border-collapse: collapse;
            text-align: left;
        }
        .verify-details-table td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        .verify-details-table td.label {
            font-weight: 600;
            color: var(--text-light);
            width: 35%;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Credential Verification</h2>
            <p style="opacity:0.8; margin-top:0.25rem;">Verify the authenticity of BDA training certificates</p>
        </div>

        <div class="verify-body">
            <!-- Search View -->
            <div id="searchView">
                <p style="margin-bottom:1.5rem; text-align:center;">Enter the unique credential number printed at the bottom left of the certificate to verify its validity.</p>
                <div class="form-group">
                    <label for="certInput">Certificate Credential Number</label>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" class="form-control" id="certInput" placeholder="e.g. BDA-A1B2C3D4" style="text-transform:uppercase;">
                        <button class="btn btn-primary" onclick="searchCertificate()">Verify</button>
                    </div>
                </div>
                <div style="text-align:center; margin-top:2rem;">
                    <a href="/login" style="font-size:0.9rem; font-weight:600; color:var(--primary-light); text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to Student Login</a>
                </div>
            </div>

            <!-- Result View -->
            <div id="resultView" style="display:none;">
                <div id="resultBox" class="result-box">
                    <!-- Dynamic validation results -->
                </div>
                <button class="btn btn-outline" style="width:100%; margin-top:1.5rem;" onclick="resetVerification()"><i class="fas fa-search"></i> Verify Another Certificate</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const certCode = params.get('cert');
            if (certCode) {
                document.getElementById('certInput').value = certCode;
                performVerification(certCode);
            }
        });

        async function searchCertificate() {
            const code = document.getElementById('certInput').value.trim().toUpperCase();
            if (!code) return;
            performVerification(code);
        }

        async function performVerification(code) {
            document.getElementById('searchView').style.display = 'none';
            const resultView = document.getElementById('resultView');
            const resultBox = document.getElementById('resultBox');
            
            resultView.style.display = 'block';
            resultBox.innerHTML = '<div style="padding:2rem;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i><p style="margin-top:0.5rem;">Verifying credential status...</p></div>';

            try {
                // Fetch validation detail from public API endpoint
                const res = await fetch(`/api/certificates/verify/${code}`);
                const data = await res.json();

                if (res.ok && data.valid) {
                    resultBox.className = 'result-box valid';
                    resultBox.innerHTML = `
                        <div class="badge-status valid"><i class="fas fa-check-circle"></i> Authenticated</div>
                        <h3>Verified Certificate</h3>
                        <p style="color:var(--green); font-size:0.9rem; font-weight:600; margin-top:0.25rem;">This credential is official and active.</p>
                        
                        <table class="verify-details-table">
                            <tr>
                                <td class="label">Recipient Name</td>
                                <td><strong>${escapeHtml(data.certificate.studentName)}</strong></td>
                            </tr>
                            <tr>
                                <td class="label">Course Completed</td>
                                <td>${escapeHtml(data.certificate.courseName)}</td>
                            </tr>
                            <tr>
                                <td class="label">Date Issued</td>
                                <td>${formatDate(data.certificate.issuedAt)}</td>
                            </tr>
                            <tr>
                                <td class="label">Credential ID</td>
                                <td style="font-family:monospace; font-weight:700;">${data.certificate.certNumber}</td>
                            </tr>
                        </table>
                    `;
                } else {
                    showInvalidResult(code);
                }
            } catch (err) {
                showInvalidResult(code);
            }
        }

        function showInvalidResult(code) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box invalid';
            resultBox.innerHTML = `
                <div class="badge-status invalid"><i class="fas fa-times-circle"></i> Invalid</div>
                <h3>Verification Failed</h3>
                <p style="color:var(--red); font-size:0.9rem; font-weight:600; margin-top:0.25rem;">Credential ID could not be found or has expired.</p>
                <div style="margin-top:1.5rem; text-align:left; font-size:0.9rem; line-height:1.5; color:var(--text-light); padding:1rem; background:rgba(0,0,0,0.02); border-radius:6px;">
                    The ID <strong>${escapeHtml(code)}</strong> does not match any certificate recorded in our database. Please double-check spelling or contact BDA admin support if this error persists.
                </div>
            `;
        }

        function resetVerification() {
            // Clear search param
            history.pushState(null, '', '/verify.html');
            document.getElementById('certInput').value = '';
            document.getElementById('resultView').style.display = 'none';
            document.getElementById('searchView').style.display = 'block';
        }

        // Helpers
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }
    </script>
</body>
</html>
