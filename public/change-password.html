<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Beyond Data Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-in-up">
            <div class="auth-header" style="background: var(--gradient-golden);">
                <div class="auth-logo" style="background: var(--gradient-primary);">
                    <i class="fas fa-key" style="color: var(--yellow);"></i>
                </div>
                <h1 style="color: var(--primary);">Change Password</h1>
                <p style="color: var(--primary-light);">Please set a new password to continue</p>
            </div>
            <div class="auth-body">
                <div class="alert alert-warning" style="margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>You must change your temporary password before accessing the platform.</span>
                </div>
                <div id="pwAlert" style="display:none"></div>
                <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> New Password</label>
                        <div class="password-toggle">
                            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required minlength="8" oninput="checkStrength()">
                            <button type="button" class="password-toggle-btn" onclick="togglePw('newPassword', 'pwIcon1')">
                                <i class="fas fa-eye" id="pwIcon1"></i>
                            </button>
                        </div>
                        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                        <p class="password-hint" id="strengthText">Minimum 8 characters</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
                        <div class="password-toggle">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
                            <button type="button" class="password-toggle-btn" onclick="togglePw('confirmPassword', 'pwIcon2')">
                                <i class="fas fa-eye" id="pwIcon2"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-golden auth-submit" id="changeBtn">
                        <i class="fas fa-save"></i> Set New Password
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
        if (!API.isLoggedIn()) window.location.href = '/login';

        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        function checkStrength() {
            const pw = document.getElementById('newPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) strength++;
            if (/\d/.test(pw)) strength++;
            if (/[^a-zA-Z0-9]/.test(pw)) strength++;

            const levels = ['', 'weak', 'fair', 'good', 'strong'];
            const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
            bar.className = 'password-strength-bar ' + (levels[strength] || '');
            text.textContent = labels[strength] || 'Minimum 8 characters';
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            const btn = document.getElementById('changeBtn');
            const alert = document.getElementById('pwAlert');
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            if (newPw !== confirmPw) {
                alert.style.display = 'block';
                alert.className = 'alert alert-danger';
                alert.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            alert.style.display = 'none';

            try {
                const result = await API.post('/auth/change-password', {
                    newPassword: newPw, confirmPassword: confirmPw
                });
                API.setToken(result.token);
                const user = API.getUser();
                if (user) { user.firstLogin = false; API.setUser(user); }

                showToast('Password changed successfully!', 'success');
                setTimeout(() => {
                    if (user?.role === 'admin') window.location.href = '/admin/dashboard.html';
                    else if (user?.role === 'mentor') window.location.href = '/mentor/dashboard.html';
                    else window.location.href = '/student/dashboard.html';
                }, 1000);
            } catch (err) {
                alert.style.display = 'block';
                alert.className = 'alert alert-danger';
                alert.innerHTML = `<i class="fas fa-times-circle"></i> ${err.error || 'Failed to change password'}`;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Set New Password';
            }
        }
    </script>
</body>
</html>
