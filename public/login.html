<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beyond Data Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1>Beyond Data Analytics</h1>
                <p>Learning Platform</p>
            </div>
            <div class="auth-body">
                <div id="loginAlert" style="display:none"></div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user"></i> Username</label>
                        <input type="text" class="form-control" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-toggle">
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="password-toggle-btn" onclick="togglePassword()">
                                <i class="fas fa-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary auth-submit" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
            </div>
            <div class="auth-footer">
                <p style="color: var(--text-muted); font-size: 0.85rem;">
                    <i class="fas fa-info-circle"></i> Contact your administrator for account access
                </p>
                <a href="/" style="display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.75rem; font-size: 0.85rem;">
                    <i class="fas fa-arrow-left"></i> Back to Website
                </a>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (API.isLoggedIn()) {
            const user = API.getUser();
            if (user) {
                if (user.firstLogin) window.location.href = '/change-password';
                else if (user.role === 'admin') window.location.href = '/admin/dashboard.html';
                else if (user.role === 'mentor') window.location.href = '/mentor/dashboard.html';
                else if (user.role === 'instructor') window.location.href = '/instructor/dashboard.html';
                else window.location.href = '/student/dashboard.html';
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            alert.style.display = 'none';

            try {
                const result = await API.post('/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                });

                API.setToken(result.token);
                API.setUser(result.user);

                showToast('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    if (result.user.firstLogin) {
                        window.location.href = '/change-password';
                    } else if (result.user.role === 'admin') {
                        window.location.href = '/admin/dashboard.html';
                    } else if (result.user.role === 'mentor') {
                        window.location.href = '/mentor/dashboard.html';
                    } else if (result.user.role === 'instructor') {
                        window.location.href = '/instructor/dashboard.html';
                    } else {
                        window.location.href = '/student/dashboard.html';
                    }
                }, 500);
            } catch (err) {
                alert.style.display = 'block';
                alert.className = 'alert alert-danger';
                alert.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.error || 'Login failed'}`;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }
    </script>
</body>
</html>
